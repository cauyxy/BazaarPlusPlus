<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BazaarPlusPlus Overlay</title>
    <link rel="stylesheet" href="/assets/overlay.css" />
    <script type="module" src="/assets/overlay.js"></script>
  </head>
  <body>
    <main id="overlay-root" class="overlay empty" data-state="idle">
      <section class="list-shell">
        <header class="overlay-header">
          <div class="header-lockup" aria-label="BazaarPlusPlus overlay status">
            <div class="header-brand" aria-hidden="true">BazaarPlusPlus</div>
            <div class="status-pill">
              <span id="overlay-status-dot" class="status-dot" aria-hidden="true"></span>
              <p id="overlay-status" class="status-line">Waiting</p>
            </div>
          </div>
        </header>

        <section id="overlay-empty" class="empty-state">
          <p id="overlay-empty-title" class="empty-title">No records yet</p>
          <p id="overlay-empty-detail" class="empty-detail">
            Start a match and the overlay will update automatically.
          </p>
        </section>

        <section id="overlay-list" class="run-list" hidden></section>
      </section>
    </main>
  </body>
</html>
